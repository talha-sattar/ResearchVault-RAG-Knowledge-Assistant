services:
  postgres:
    image: postgres:16-alpine
    container_name: researchvault-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-researchvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchvault}
      POSTGRES_DB: ${POSTGRES_DB:-researchvault}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchvault}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
